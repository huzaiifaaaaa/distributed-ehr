version: '3.8'
services:
  node1:
    build: .
    environment:
      NODE_ID: node1
      NODE_URL: http://node1:5001
      PEERS: node2=http://node2:5001,node3=http://node3:5001
    ports: ["5001:5001"]

  node2:
    build: .
    environment:
      NODE_ID: node2
      NODE_URL: http://node2:5001
      PEERS: node1=http://node1:5001,node3=http://node3:5001
    ports: ["5002:5001"]

  node3:
    build: .
    environment:
      NODE_ID: node3
      NODE_URL: http://node3:5001
      PEERS: node1=http://node1:5001,node2=http://node2:5001
    ports: ["5003:5001"]